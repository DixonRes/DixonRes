name: C/C++ CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────────────────────
  # Linux: static build + test + artifact
  # ──────────────────────────────────────────────────────────────
  build-linux-static:
    runs-on: ubuntu-latest
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/deps-static

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgmp-dev libmpfr-dev \
            autoconf automake libtool pkg-config \
            make gcc g++ binutils

      - name: Set build environment
        run: |
          echo "INSTALL_PREFIX=$INSTALL_PREFIX"               >> $GITHUB_ENV
          echo "C_INCLUDE_PATH=$INSTALL_PREFIX/include"       >> $GITHUB_ENV
          echo "LIBRARY_PATH=$INSTALL_PREFIX/lib"             >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$INSTALL_PREFIX/lib/pkgconfig" >> $GITHUB_ENV
          mkdir -p "$INSTALL_PREFIX"

      - name: Build FLINT (static) - version 3.5.0
        run: |
          git clone --depth=1 --branch flint-3.5 https://github.com/flintlib/flint.git
          cd flint
          ./bootstrap.sh
          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --enable-static \
            --disable-shared
          make -j$(nproc)
          make install

      # Linux GNU ld: --allow-multiple-definition handles FLINT/PML
      # duplicate symbols at link time; no archive pre-processing needed.

      - name: Configure project (static)
        run: |
          ./configure \
            --enable-static \
            --flint-include="$INSTALL_PREFIX/include" \
            --flint-lib="$INSTALL_PREFIX/lib"

      - name: Build
        run: make -j$(nproc)

      - name: Run tests
        run: make check

      - name: Verify static linkage
        run: |
          echo "=== ldd drsolve ==="
          ldd ./drsolve || true
          if ldd ./drsolve 2>/dev/null | grep -E 'libflint|libpml'; then
            echo "ERROR: binary is dynamically linked against FLINT or PML"
            exit 1
          fi
          echo "OK: FLINT and PML are statically linked"

      - name: Prepare release artifact
        run: |
          ARCH=$(uname -m)
          TAG="${{ github.ref_name }}"
          strip ./drsolve
          ARTIFACT_NAME="drsolve-${TAG}-linux-${ARCH}"
          mkdir -p dist
          cp ./drsolve "dist/${ARTIFACT_NAME}"
          cat > dist/build-info-linux.txt <<EOF
          Binary   : ${ARTIFACT_NAME}
          Built on : $(date -u +"%Y-%m-%d %H:%M UTC")
          OS       : $(lsb_release -ds 2>/dev/null || uname -sr)
          Arch     : ${ARCH}
          Ref      : ${{ github.ref }}
          SHA      : ${{ github.sha }}
          FLINT    : static (3.4.0)
          PML      : static
          EOF
          cat dist/build-info-linux.txt
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
          retention-days: 90

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARTIFACT_NAME }}
          body_path: dist/build-info-linux.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ──────────────────────────────────────────────────────────────
  # macOS: static build + test + artifact
  # ──────────────────────────────────────────────────────────────
  build-macos-static:
    runs-on: macos-latest
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/deps-static

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          brew update
          brew install gmp mpfr autoconf automake libtool pkg-config

      - name: Set build environment
        run: |
          BREW=$(brew --prefix)
          echo "INSTALL_PREFIX=$INSTALL_PREFIX"                                      >> $GITHUB_ENV
          echo "CPATH=$INSTALL_PREFIX/include:$BREW/include"                         >> $GITHUB_ENV
          echo "LIBRARY_PATH=$INSTALL_PREFIX/lib:$BREW/lib"                          >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$INSTALL_PREFIX/lib/pkgconfig:$BREW/lib/pkgconfig"   >> $GITHUB_ENV
          mkdir -p "$INSTALL_PREFIX"

      - name: Build FLINT (static) - version 3.5.0
        run: |
          BREW=$(brew --prefix)
          git clone --depth=1 --branch flint-3.5 https://github.com/flintlib/flint.git
          cd flint
          ./bootstrap.sh
          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --enable-static \
            --disable-shared \
            --with-gmp="$BREW" \
            --with-mpfr="$BREW"
          make -j$(sysctl -n hw.ncpu)
          make install

      # macOS: localize conflicting FLINT symbols with nmedit
      # (Apple ld lacks --allow-multiple-definition)
      - name: Resolve FLINT/PML duplicate symbols via nmedit (macOS)
        run: |
          FLINT_A="$INSTALL_PREFIX/lib/libflint.a"
          PML_A="$INSTALL_PREFIX/lib/libpml.a"
          TMPDIR_WORK=$(mktemp -d)

          # ── collect PML's exported symbols (strip leading underscore) ──
          echo "Collecting PML exported symbols..."
          PML_SYMS=$(nm -g "$PML_A" 2>/dev/null \
            | awk '/ T / || / D / || / B / {sym=$3; sub(/^_/,"",sym); print sym}' \
            | sort -u)

          # ── extract FLINT archive ─────────────────────────────────────
          echo "Extracting libflint.a..."
          (cd "$TMPDIR_WORK" && ar -x "$FLINT_A")

          MODIFIED_OBJS=""

          for obj in "$TMPDIR_WORK"/*.o; do
            obj_name=$(basename "$obj")

            # All globally defined symbols in this object (without _)
            ALL_GLOBALS=$(nm -g "$obj" 2>/dev/null \
              | awk '/ T / || / D / || / B / {sym=$3; sub(/^_/,"",sym); print sym}' \
              | sort -u)

            # Which of those also appear in PML?
            CONFLICTS=$(comm -12 \
              <(echo "$ALL_GLOBALS") \
              <(echo "$PML_SYMS"))

            [ -z "$CONFLICTS" ] && continue

            echo "In $obj_name — making local:"
            echo "$CONFLICTS" | sed 's/^/    /'

            # Keep-global list = all globals MINUS the conflicting ones
            KEEP_FILE=$(mktemp)
            comm -23 \
              <(echo "$ALL_GLOBALS") \
              <(echo "$CONFLICTS" | sort -u) \
              | grep -v '^[[:space:]]*$' \
              | sed 's/^/_/' \
              > "$KEEP_FILE"
            
            KEEP_COUNT=$(grep -c '' "$KEEP_FILE" || echo 0)

            if [ "$KEEP_COUNT" -gt 0 ]; then
              # nmedit -s: only listed symbols stay global; rest become
              # private extern (invisible to the linker across TUs).
              # nmedit accepts names with OR without leading underscore.
              nmedit -s "$KEEP_FILE" "$obj"
            else
              # Entire object is conflicting — make everything local
              nmedit -p "$obj"
            fi

            rm -f "$KEEP_FILE"
            MODIFIED_OBJS="$MODIFIED_OBJS $obj_name"
          done

          if [ -n "$MODIFIED_OBJS" ]; then
            echo "Updating libflint.a with localized objects..."
            (cd "$TMPDIR_WORK" && ar -r "$FLINT_A" $MODIFIED_OBJS)
            echo "Localization complete."
            # Sanity check: essential symbols must still be globally defined
            echo "Sanity check — nmod_mat_set still in libflint.a:"
            nm -g "$FLINT_A" 2>/dev/null | grep ' T _nmod_mat_set$' \
              || { echo "ERROR: _nmod_mat_set missing after nmedit!"; exit 1; }
          else
            echo "No conflicting symbols found — nothing to localize."
          fi

          rm -rf "$TMPDIR_WORK"

      - name: Configure project (static)
        run: |
          ./configure \
            --enable-static \
            --flint-include="$INSTALL_PREFIX/include" \
            --flint-lib="$INSTALL_PREFIX/lib"

      - name: Build
        run: make -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: make check

      - name: Verify static linkage
        run: |
          echo "=== otool -L drsolve ==="
          otool -L ./drsolve
          if otool -L ./drsolve | grep -E 'libflint|libpml'; then
            echo "ERROR: binary is dynamically linked against FLINT or PML"
            exit 1
          fi
          echo "OK: FLINT and PML are statically linked"

      - name: Prepare release artifact
        run: |
          MACOS_VER=$(sw_vers -productVersion | cut -d. -f1-2)
          ARCH=$(uname -m)
          TAG="${{ github.ref_name }}"
          strip ./drsolve
          ARTIFACT_NAME="drsolve-${TAG}-macos${MACOS_VER}-${ARCH}"
          mkdir -p dist
          cp ./drsolve "dist/${ARTIFACT_NAME}"
          cat > dist/build-info-macos.txt <<EOF
          Binary   : ${ARTIFACT_NAME}
          Built on : $(date -u +"%Y-%m-%d %H:%M UTC")
          macOS    : $(sw_vers -productVersion)
          Arch     : ${ARCH}
          Ref      : ${{ github.ref }}
          SHA      : ${{ github.sha }}
          FLINT    : static (3.4.0)
          PML      : static
          EOF
          cat dist/build-info-macos.txt
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
          retention-days: 90

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARTIFACT_NAME }}
          body_path: dist/build-info-macos.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
