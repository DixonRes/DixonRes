name: C/C++ CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────────────────────
  # Linux: static build + test + artifact
  # ──────────────────────────────────────────────────────────────
  build-linux-static:
    runs-on: ubuntu-22.04
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/deps-static

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgmp-dev libmpfr-dev \
            autoconf automake libtool pkg-config \
            make gcc g++ binutils

      - name: Set build environment
        run: |
          echo "INSTALL_PREFIX=$INSTALL_PREFIX"               >> $GITHUB_ENV
          echo "C_INCLUDE_PATH=$INSTALL_PREFIX/include"       >> $GITHUB_ENV
          echo "LIBRARY_PATH=$INSTALL_PREFIX/lib"             >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$INSTALL_PREFIX/lib/pkgconfig" >> $GITHUB_ENV
          mkdir -p "$INSTALL_PREFIX"

      - name: Build FLINT (static) - version 3.5.0
        run: |
          git clone --depth=1 --branch flint-3.5 https://github.com/flintlib/flint.git
          cd flint
          ./bootstrap.sh
          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --enable-static \
            --disable-shared
          make -j$(nproc)
          make install

      # Linux GNU ld: --allow-multiple-definition handles FLINT/PML
      # duplicate symbols at link time; no archive pre-processing needed.

      - name: Configure project (static)
        run: |
          ./configure \
            --enable-static \
            --flint-include="$INSTALL_PREFIX/include" \
            --flint-lib="$INSTALL_PREFIX/lib"

      - name: Build
        run: make -j$(nproc)

      - name: Run tests
        run: make check

      - name: Verify static linkage
        run: |
          echo "=== ldd drsolve ==="
          ldd ./drsolve || true
          if ldd ./drsolve 2>/dev/null | grep -E 'libflint|libpml'; then
            echo "ERROR: binary is dynamically linked against FLINT or PML"
            exit 1
          fi
          echo "OK: FLINT and PML are statically linked"

      - name: Prepare release artifact
        run: |
          ARCH=$(uname -m)
          TAG="${{ github.ref_name }}"
          strip ./drsolve
          ARTIFACT_NAME="drsolve-${TAG}-linux-${ARCH}"
          mkdir -p dist
          cp ./drsolve "dist/${ARTIFACT_NAME}"
          cat > dist/build-info-linux.txt <<EOF
          Binary   : ${ARTIFACT_NAME}
          Built on : $(date -u +"%Y-%m-%d %H:%M UTC")
          OS       : $(lsb_release -ds 2>/dev/null || uname -sr)
          Arch     : ${ARCH}
          Ref      : ${{ github.ref }}
          SHA      : ${{ github.sha }}
          FLINT    : static (3.4.0)
          PML      : static
          EOF
          cat dist/build-info-linux.txt
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
          retention-days: 90

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARTIFACT_NAME }}
          body_path: dist/build-info-linux.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ──────────────────────────────────────────────────────────────
  # macOS: static build + test + artifact
  # ──────────────────────────────────────────────────────────────
  build-macos-static:
    runs-on: macos-latest
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/deps-static

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          brew update
          brew install gmp mpfr autoconf automake libtool pkg-config

      - name: Set build environment
        run: |
          BREW=$(brew --prefix)
          echo "INSTALL_PREFIX=$INSTALL_PREFIX"                                      >> $GITHUB_ENV
          echo "CPATH=$INSTALL_PREFIX/include:$BREW/include"                         >> $GITHUB_ENV
          echo "LIBRARY_PATH=$INSTALL_PREFIX/lib:$BREW/lib"                          >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$INSTALL_PREFIX/lib/pkgconfig:$BREW/lib/pkgconfig"   >> $GITHUB_ENV
          mkdir -p "$INSTALL_PREFIX"

      - name: Build FLINT (static) - version 3.5.0
        run: |
          BREW=$(brew --prefix)
          git clone --depth=1 --branch flint-3.5 https://github.com/flintlib/flint.git
          cd flint
          ./bootstrap.sh
          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --enable-static \
            --disable-shared \
            --with-gmp="$BREW" \
            --with-mpfr="$BREW"
          make -j$(sysctl -n hw.ncpu)
          make install

      # macOS: localize conflicting FLINT symbols with nmedit
      # (Apple ld lacks --allow-multiple-definition)
      - name: Resolve FLINT/PML duplicate symbols via nmedit (macOS)
        run: |
          FLINT_A="$INSTALL_PREFIX/lib/libflint.a"
          PML_A="$INSTALL_PREFIX/lib/libpml.a"
          WORK_DIR=$(mktemp -d)
          
          echo "Step 1: Extracting PML symbols..."
          # Get all global defined symbols from PML (including underscores)
          nm -gj "$PML_A" | sort -u > pml_symbols.txt

          echo "Step 2: Extracting libflint.a objects uniquely..."
          mkdir -p "$WORK_DIR/objs"
          cd "$WORK_DIR/objs"
          # Use ar -t to get the list of filenames and rename with index to prevent overwriting (avoid collisions with identical .o names)
          ar -t "$FLINT_A" | awk '{print $0, NR}' | while read -r obj idx; do
            ar -p "$FLINT_A" "$obj" > "${idx}_${obj}"
          done

          echo "Step 3: Processing objects with nmedit..."
          for obj in *.o; do
            # Get the global symbols from this object file
            nm -gj "$obj" | sort -u > obj_symbols.txt
            
            # Find symbols that conflict with PML
            comm -12 ../pml_symbols.txt obj_symbols.txt > conflicts.txt
            
            if [ -s conflicts.txt ]; then
              echo "Localizing symbols in $obj: $(cat conflicts.txt | tr '\n' ' ')"
              
              # Build 'keep' list: keep symbols that are not conflicting as global
              comm -23 obj_symbols.txt conflicts.txt > keep_symbols.txt
              
              if [ -s keep_symbols.txt ]; then
                # Keep only symbols in keep_symbols.txt as global, turn the rest into private extern
                nmedit -s keep_symbols.txt "$obj"
              else
                # If all symbols conflict, turn all into private
                nmedit -p "$obj"
              fi
            fi
          done

          echo "Step 4: Rebuilding libflint.a..."
          # Use libtool instead of ar, this is the recommended way to handle static libraries on macOS
          libtool -static -o "$FLINT_A" *.o
          
          echo "Localization complete. Verifying..."
          # Verify that the problematic symbol is no longer global T (should become non-global t)
          if nm -g "$FLINT_A" | grep -q "_nmod_mat_left_nullspace$"; then
             echo "Error: Symbol _nmod_mat_left_nullspace is still global!"
             exit 1
          fi

      - name: Configure project (static)
        run: |
          ./configure \
            --enable-static \
            --flint-include="$INSTALL_PREFIX/include" \
            --flint-lib="$INSTALL_PREFIX/lib"

      - name: Build
        run: make -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: make check

      - name: Verify static linkage
        run: |
          echo "=== otool -L drsolve ==="
          otool -L ./drsolve
          if otool -L ./drsolve | grep -E 'libflint|libpml'; then
            echo "ERROR: binary is dynamically linked against FLINT or PML"
            exit 1
          fi
          echo "OK: FLINT and PML are statically linked"

      - name: Prepare release artifact
        run: |
          MACOS_VER=$(sw_vers -productVersion | cut -d. -f1-2)
          ARCH=$(uname -m)
          TAG="${{ github.ref_name }}"
          strip ./drsolve
          ARTIFACT_NAME="drsolve-${TAG}-macos${MACOS_VER}-${ARCH}"
          mkdir -p dist
          cp ./drsolve "dist/${ARTIFACT_NAME}"
          cat > dist/build-info-macos.txt <<EOF
          Binary   : ${ARTIFACT_NAME}
          Built on : $(date -u +"%Y-%m-%d %H:%M UTC")
          macOS    : $(sw_vers -productVersion)
          Arch     : ${ARCH}
          Ref      : ${{ github.ref }}
          SHA      : ${{ github.sha }}
          FLINT    : static (3.4.0)
          PML      : static
          EOF
          cat dist/build-info-macos.txt
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
          retention-days: 90

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARTIFACT_NAME }}
          body_path: dist/build-info-macos.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
