name: C/C++ CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────────────────────
  # Linux: static build + test + artifact
  # ──────────────────────────────────────────────────────────────
  build-linux-static:
    runs-on: ubuntu-22.04
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/deps-static

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgmp-dev libmpfr-dev \
            autoconf automake libtool pkg-config \
            make gcc g++ binutils

      - name: Set build environment
        run: |
          echo "INSTALL_PREFIX=$INSTALL_PREFIX"               >> $GITHUB_ENV
          echo "C_INCLUDE_PATH=$INSTALL_PREFIX/include"       >> $GITHUB_ENV
          echo "LIBRARY_PATH=$INSTALL_PREFIX/lib"             >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$INSTALL_PREFIX/lib/pkgconfig" >> $GITHUB_ENV
          mkdir -p "$INSTALL_PREFIX"

      - name: Build FLINT (static) - version 3.5.0
        run: |
          git clone --depth=1 --branch flint-3.5 https://github.com/flintlib/flint.git
          cd flint
          ./bootstrap.sh
          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --enable-static \
            --disable-shared
          make -j$(nproc)
          make install

      # Linux GNU ld: --allow-multiple-definition handles FLINT/PML
      # duplicate symbols at link time; no archive pre-processing needed.

      - name: Configure project (static)
        run: |
          ./configure \
            --enable-static \
            --flint-include="$INSTALL_PREFIX/include" \
            --flint-lib="$INSTALL_PREFIX/lib"

      - name: Build
        run: make -j$(nproc)

      - name: Run tests
        run: make check

      - name: Verify static linkage
        run: |
          echo "=== ldd drsolve ==="
          ldd ./drsolve || true
          if ldd ./drsolve 2>/dev/null | grep -E 'libflint|libpml'; then
            echo "ERROR: binary is dynamically linked against FLINT or PML"
            exit 1
          fi
          echo "OK: FLINT and PML are statically linked"

      - name: Prepare release artifact
        run: |
          ARCH=$(uname -m)
          TAG="${{ github.ref_name }}"
          strip ./drsolve
          ARTIFACT_NAME="drsolve-${TAG}-linux-${ARCH}"
          mkdir -p dist
          cp ./drsolve "dist/${ARTIFACT_NAME}"
          cat > dist/build-info-linux.txt <<EOF
          Binary   : ${ARTIFACT_NAME}
          Built on : $(date -u +"%Y-%m-%d %H:%M UTC")
          OS       : $(lsb_release -ds 2>/dev/null || uname -sr)
          Arch     : ${ARCH}
          Ref      : ${{ github.ref }}
          SHA      : ${{ github.sha }}
          FLINT    : static (3.4.0)
          PML      : static
          EOF
          cat dist/build-info-linux.txt
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
          retention-days: 90

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARTIFACT_NAME }}
          body_path: dist/build-info-linux.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ──────────────────────────────────────────────────────────────
  # macOS: static build + test + artifact
  # ──────────────────────────────────────────────────────────────
  build-macos-static:
    runs-on: macos-latest
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/deps-static

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          brew update
          brew install gmp mpfr autoconf automake libtool pkg-config

      - name: Set build environment
        run: |
          BREW=$(brew --prefix)
          echo "INSTALL_PREFIX=$INSTALL_PREFIX"                                      >> $GITHUB_ENV
          echo "CPATH=$INSTALL_PREFIX/include:$BREW/include"                         >> $GITHUB_ENV
          echo "LIBRARY_PATH=$INSTALL_PREFIX/lib:$BREW/lib"                          >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$INSTALL_PREFIX/lib/pkgconfig:$BREW/lib/pkgconfig"   >> $GITHUB_ENV
          mkdir -p "$INSTALL_PREFIX"

      - name: Build FLINT (static) - version 3.5.0
        run: |
          BREW=$(brew --prefix)
          git clone --depth=1 --branch flint-3.5 https://github.com/flintlib/flint.git
          cd flint
          ./bootstrap.sh
          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --enable-static \
            --disable-shared \
            --with-gmp="$BREW" \
            --with-mpfr="$BREW"
          make -j$(sysctl -n hw.ncpu)
          make install

      # macOS: localize conflicting FLINT symbols with nmedit
      # (Apple ld lacks --allow-multiple-definition)
      - name: Resolve FLINT/PML duplicate symbols via Incremental Linking (macOS)
        run: |
          # 1. Setup paths
          FLINT_A="$INSTALL_PREFIX/lib/libflint.a"
          WORK_DIR="${{ github.workspace }}/flint_fix_work"
          export SDKROOT=$(xcrun --sdk macosx --show-sdk-path)
          
          mkdir -p "$WORK_DIR/objs"
          cd "$WORK_DIR/objs"

          # 2. Extract ALL object files from FLINT
          echo "Step 1: Extracting all objects from libflint.a..."
          ar -x "$FLINT_A"

          # 3. Define conflict symbols
          # Note: No need to rename them, just list them to be hidden from outside
          cat <<EOF > "$WORK_DIR/conflicts.txt"
          _nmod_mat_left_nullspace
          _nmod_mat_nullspace
          _fmpz_mat_nullspace
          _fmpz_mat_rank
          _fmpz_mat_solve
          EOF

          # 4. Use ld -r to combine everything into ONE big object file
          # This resolves all internal references within FLINT first.
          echo "Step 2: Combining objects into a single bundle..."
          # We use -all_load to ensure every object is included
          ld -r -all_load *.o -o "$WORK_DIR/flint_bundle.o"

          # 5. Hide the specific symbols in the bundle
          echo "Step 3: Localizing conflict symbols in the bundle..."
          # Build the -unexported_symbol flags
          EXPORT_FLAGS=""
          while read -r sym; do
            [ -n "$sym" ] && EXPORT_FLAGS="$EXPORT_FLAGS -unexported_symbol $sym"
          done < "$WORK_DIR/conflicts.txt"

          # Create the final localized object
          ld -r $EXPORT_FLAGS "$WORK_DIR/flint_bundle.o" -o "$WORK_DIR/flint_final.o"

          # 6. Replace the original library with our single-object library
          echo "Step 4: Rebuilding libflint.a..."
          rm -f "$FLINT_A"
          ar cr "$FLINT_A" "$WORK_DIR/flint_final.o"
          ranlib "$FLINT_A"

          # 7. Verification
          echo "Step 5: Final Verification..."
          # These symbols should NOT appear in the Global list (-g) anymore
          for sym in _nmod_mat_left_nullspace _fmpz_mat_solve; do
            if nm -g "$FLINT_A" | grep -qx "$sym"; then
              echo "Error: $sym is still global. Fix failed."
              exit 1
            fi
          done
          echo "Success: FLINT internal calls are preserved, but conflicts are hidden from PML."

      - name: Configure project (static)
        run: |
          ./configure \
            --enable-static \
            --flint-include="$INSTALL_PREFIX/include" \
            --flint-lib="$INSTALL_PREFIX/lib"

      - name: Build
        run: make -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: make check

      - name: Verify static linkage
        run: |
          echo "=== otool -L drsolve ==="
          otool -L ./drsolve
          if otool -L ./drsolve | grep -E 'libflint|libpml'; then
            echo "ERROR: binary is dynamically linked against FLINT or PML"
            exit 1
          fi
          echo "OK: FLINT and PML are statically linked"

      - name: Prepare release artifact
        run: |
          MACOS_VER=$(sw_vers -productVersion | cut -d. -f1-2)
          ARCH=$(uname -m)
          TAG="${{ github.ref_name }}"
          strip ./drsolve
          ARTIFACT_NAME="drsolve-${TAG}-macos${MACOS_VER}-${ARCH}"
          mkdir -p dist
          cp ./drsolve "dist/${ARTIFACT_NAME}"
          cat > dist/build-info-macos.txt <<EOF
          Binary   : ${ARTIFACT_NAME}
          Built on : $(date -u +"%Y-%m-%d %H:%M UTC")
          macOS    : $(sw_vers -productVersion)
          Arch     : ${ARCH}
          Ref      : ${{ github.ref }}
          SHA      : ${{ github.sha }}
          FLINT    : static (3.4.0)
          PML      : static
          EOF
          cat dist/build-info-macos.txt
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
          retention-days: 90

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARTIFACT_NAME }}
          body_path: dist/build-info-macos.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
