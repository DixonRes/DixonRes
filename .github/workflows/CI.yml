name: C/C++ CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────────────────────
  # Linux: static build + test + artifact
  # ──────────────────────────────────────────────────────────────
  build-linux-static:
    runs-on: ubuntu-latest
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/deps-static

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgmp-dev libmpfr-dev \
            autoconf automake libtool pkg-config \
            make gcc g++ binutils

      - name: Set build environment
        run: |
          echo "INSTALL_PREFIX=$INSTALL_PREFIX"               >> $GITHUB_ENV
          echo "C_INCLUDE_PATH=$INSTALL_PREFIX/include"       >> $GITHUB_ENV
          echo "LIBRARY_PATH=$INSTALL_PREFIX/lib"             >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$INSTALL_PREFIX/lib/pkgconfig" >> $GITHUB_ENV
          mkdir -p "$INSTALL_PREFIX"

      - name: Build FLINT (static) - version 3.5.0
        run: |
          git clone --depth=1 --branch flint-3.5 https://github.com/flintlib/flint.git
          cd flint
          ./bootstrap.sh
          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --enable-static \
            --disable-shared
          make -j$(nproc)
          make install

      # Linux: Use ld's --allow-multiple-definition flag
      - name: Configure project (static)
        run: |
          ./configure \
            --enable-static \
            --flint-include="$INSTALL_PREFIX/include" \
            --flint-lib="$INSTALL_PREFIX/lib" \
            --extra-ldflags="-Wl,--allow-multiple-definition"

      - name: Build
        run: make -j$(nproc)

      - name: Run tests
        run: make check

      - name: Verify static linkage
        run: |
          echo "=== ldd drsolve ==="
          ldd ./drsolve || true
          if ldd ./drsolve 2>/dev/null | grep -E 'libflint|libpml'; then
            echo "ERROR: binary is dynamically linked against FLINT or PML"
            exit 1
          fi
          echo "OK: FLINT and PML are statically linked"

      - name: Prepare release artifact
        run: |
          ARCH=$(uname -m)
          TAG="${{ github.ref_name }}"
          strip ./drsolve
          ARTIFACT_NAME="drsolve-${TAG}-linux-${ARCH}"
          mkdir -p dist
          cp ./drsolve "dist/${ARTIFACT_NAME}"
          cat > dist/build-info-linux.txt <<EOF
          Binary   : ${ARTIFACT_NAME}
          Built on : $(date -u +"%Y-%m-%d %H:%M UTC")
          OS       : $(lsb_release -ds 2>/dev/null || uname -sr)
          Arch     : ${ARCH}
          Ref      : ${{ github.ref }}
          SHA      : ${{ github.sha }}
          FLINT    : static (3.4.0)
          PML      : static
          EOF
          cat dist/build-info-linux.txt
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
          retention-days: 90

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARTIFACT_NAME }}
          body_path: dist/build-info-linux.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ──────────────────────────────────────────────────────────────
  # macOS: static build + test + artifact
  # ──────────────────────────────────────────────────────────────
  build-macos-static:
    runs-on: macos-latest
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/deps-static

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          brew update
          brew install gmp mpfr autoconf automake libtool pkg-config

      - name: Set build environment
        run: |
          BREW=$(brew --prefix)
          echo "INSTALL_PREFIX=$INSTALL_PREFIX"                                      >> $GITHUB_ENV
          echo "CPATH=$INSTALL_PREFIX/include:$BREW/include"                         >> $GITHUB_ENV
          echo "LIBRARY_PATH=$INSTALL_PREFIX/lib:$BREW/lib"                          >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$INSTALL_PREFIX/lib/pkgconfig:$BREW/lib/pkgconfig"   >> $GITHUB_ENV
          mkdir -p "$INSTALL_PREFIX"

      - name: Build FLINT (static) - version 3.5.0
        run: |
          BREW=$(brew --prefix)
          git clone --depth=1 --branch flint-3.5 https://github.com/flintlib/flint.git
          cd flint
          ./bootstrap.sh
          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --enable-static \
            --disable-shared \
            --with-gmp="$BREW" \
            --with-mpfr="$BREW"
          make -j$(sysctl -n hw.ncpu)
          make install

      # macOS workaround: Create linker wrapper that filters duplicate symbol errors
      # Apple's ld doesn't support --allow-multiple-definition like GNU ld
      # This wrapper filters out duplicate symbol errors but passes all other errors
      - name: Create linker wrapper to filter duplicate symbol errors (macOS)
        run: |
          # Create a wrapper script that intercepts ld calls
          sudo tee /usr/local/bin/ld-wrapper > /dev/null << 'EOF'
          #!/bin/bash
          # Wrapper for macOS linker to ignore duplicate symbol errors
          # This allows static linking when both FLINT and PML define the same symbols
          
          # Call the real linker with all arguments
          output=$(/usr/bin/ld "$@" 2>&1)
          status=$?
          
          # Filter out duplicate symbol errors but preserve other errors/warnings
          # Check if the error is only about duplicate symbols
          if echo "$output" | grep -q "duplicate symbol"; then
            # Filter out duplicate symbol lines and check if anything else remains
            filtered_output=$(echo "$output" | grep -v "duplicate symbol" | grep -v "^ld: warning:" | grep -v "^[[:space:]]*$")
            
            if [ -n "$filtered_output" ]; then
              # There are non-duplicate errors, show them
              echo "$filtered_output" >&2
              exit $status
            else
              # Only duplicate symbol errors, treat as success
              echo "Note: Duplicate symbol errors ignored (expected due to FLINT/PML overlap)" >&2
              exit 0
            fi
          else
            # No duplicate symbols, pass through output and status
            if [ -n "$output" ]; then
              echo "$output" >&2
            fi
            exit $status
          fi
          EOF
          
          # Make the wrapper executable
          sudo chmod +x /usr/local/bin/ld-wrapper
          
          # Tell the build system to use our wrapper instead of the real ld
          # Also set LIBRARY_PATH to ensure our wrapper is found first
          echo "LD=/usr/local/bin/ld-wrapper" >> $GITHUB_ENV
          echo "CMAKE_LD=/usr/local/bin/ld-wrapper" >> $GITHUB_ENV
          
          # Verify the wrapper works
          echo "Linker wrapper created successfully at /usr/local/bin/ld-wrapper"

      - name: Configure project (static) with macOS workaround
        run: |
          # Configure with extra linker flags that work with our wrapper
          # Note: --allow-multiple-definition is ignored by wrapper but kept for compatibility
          ./configure \
            --enable-static \
            --flint-include="$INSTALL_PREFIX/include" \
            --flint-lib="$INSTALL_PREFIX/lib" \
            --extra-ldflags="-Wl,-undefined,dynamic_lookup"

      - name: Build
        run: |
          # Ensure our linker wrapper is used
          export LD=/usr/local/bin/ld-wrapper
          export CMAKE_LD=/usr/local/bin/ld-wrapper
          make -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: make check

      - name: Verify static linkage
        run: |
          echo "=== otool -L drsolve ==="
          otool -L ./drsolve
          if otool -L ./drsolve | grep -E 'libflint|libpml'; then
            echo "ERROR: binary is dynamically linked against FLINT or PML"
            exit 1
          fi
          echo "OK: FLINT and PML are statically linked"

      - name: Prepare release artifact
        run: |
          MACOS_VER=$(sw_vers -productVersion | cut -d. -f1-2)
          ARCH=$(uname -m)
          TAG="${{ github.ref_name }}"
          strip ./drsolve
          ARTIFACT_NAME="drsolve-${TAG}-macos${MACOS_VER}-${ARCH}"
          mkdir -p dist
          cp ./drsolve "dist/${ARTIFACT_NAME}"
          cat > dist/build-info-macos.txt <<EOF
          Binary   : ${ARTIFACT_NAME}
          Built on : $(date -u +"%Y-%m-%d %H:%M UTC")
          macOS    : $(sw_vers -productVersion)
          Arch     : ${ARCH}
          Ref      : ${{ github.ref }}
          SHA      : ${{ github.sha }}
          FLINT    : static (3.4.0)
          PML      : static
          EOF
          cat dist/build-info-macos.txt
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
          retention-days: 90

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARTIFACT_NAME }}
          body_path: dist/build-info-macos.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
