name: C/C++ CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────────────────────
  # Linux: static build + test + artifact
  # ──────────────────────────────────────────────────────────────
  build-linux-static:
    if: false
    runs-on: ubuntu-22.04
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/deps-static

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgmp-dev libmpfr-dev \
            autoconf automake libtool pkg-config \
            make gcc g++ binutils

      - name: Set build environment
        run: |
          echo "INSTALL_PREFIX=$INSTALL_PREFIX"               >> $GITHUB_ENV
          echo "C_INCLUDE_PATH=$INSTALL_PREFIX/include"       >> $GITHUB_ENV
          echo "LIBRARY_PATH=$INSTALL_PREFIX/lib"             >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$INSTALL_PREFIX/lib/pkgconfig" >> $GITHUB_ENV
          mkdir -p "$INSTALL_PREFIX"

      - name: Build FLINT (static) - version 3.5.0
        run: |
          git clone --depth=1 --branch flint-3.5 https://github.com/flintlib/flint.git
          cd flint
          ./bootstrap.sh
          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --enable-static \
            --disable-shared
          make -j$(nproc)
          make install

      # Linux GNU ld: --allow-multiple-definition handles FLINT/PML
      # duplicate symbols at link time; no archive pre-processing needed.

      - name: Configure project (static)
        run: |
          ./configure \
            --enable-static \
            --flint-include="$INSTALL_PREFIX/include" \
            --flint-lib="$INSTALL_PREFIX/lib"

      - name: Build
        run: make -j$(nproc)

      - name: Run tests
        run: make check

      - name: Verify static linkage
        run: |
          echo "=== ldd drsolve ==="
          ldd ./drsolve || true
          if ldd ./drsolve 2>/dev/null | grep -E 'libflint|libpml'; then
            echo "ERROR: binary is dynamically linked against FLINT or PML"
            exit 1
          fi
          echo "OK: FLINT and PML are statically linked"

      - name: Prepare release artifact
        run: |
          ARCH=$(uname -m)
          TAG="${{ github.ref_name }}"
          strip ./drsolve
          ARTIFACT_NAME="drsolve-${TAG}-linux-${ARCH}"
          mkdir -p dist
          cp ./drsolve "dist/${ARTIFACT_NAME}"
          cat > dist/build-info-linux.txt <<EOF
          Binary   : ${ARTIFACT_NAME}
          Built on : $(date -u +"%Y-%m-%d %H:%M UTC")
          OS       : $(lsb_release -ds 2>/dev/null || uname -sr)
          Arch     : ${ARCH}
          Ref      : ${{ github.ref }}
          SHA      : ${{ github.sha }}
          FLINT    : static (3.4.0)
          PML      : static
          EOF
          cat dist/build-info-linux.txt
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
          retention-days: 90

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARTIFACT_NAME }}
          body_path: dist/build-info-linux.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ──────────────────────────────────────────────────────────────
  # macOS: static build + test + artifact
  # ──────────────────────────────────────────────────────────────
  build-macos-static:
    runs-on: macos-latest
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/deps-static

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          brew update
          brew install gmp mpfr autoconf automake libtool pkg-config binutils

      - name: Set build environment
        run: |
          BREW=$(brew --prefix)
          echo "INSTALL_PREFIX=$INSTALL_PREFIX"                                      >> $GITHUB_ENV
          echo "CPATH=$INSTALL_PREFIX/include:$BREW/include"                         >> $GITHUB_ENV
          echo "LIBRARY_PATH=$INSTALL_PREFIX/lib:$BREW/lib"                          >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$INSTALL_PREFIX/lib/pkgconfig:$BREW/lib/pkgconfig"   >> $GITHUB_ENV
          mkdir -p "$INSTALL_PREFIX"

      - name: Cache FLINT static install
        id: flint-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.INSTALL_PREFIX }}
          key: macos-flint-3.5-static-${{ runner.arch }}-v1

      - name: Build FLINT (static) - version 3.5.0
        if: steps.flint-cache.outputs.cache-hit != 'true'
        run: |
          BREW=$(brew --prefix)
          git clone --depth=1 --branch flint-3.5 https://github.com/flintlib/flint.git
          cd flint
          ./bootstrap.sh
          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --enable-static \
            --disable-shared \
            --with-gmp="$BREW" \
            --with-mpfr="$BREW"
          make -j$(sysctl -n hw.ncpu)
          make install

      # macOS: localize conflicting FLINT symbols with nmedit
      # (Apple ld lacks --allow-multiple-definition)
      - name: Resolve FLINT/PML duplicate symbols via nmedit (macOS Native)
        run: |
          set -eu

          # 1. Paths
          FLINT_A="$INSTALL_PREFIX/lib/libflint.a"
          
          # 2. Create the list of symbols to hide
          # These must have the leading underscore as seen in the error message
          cat <<EOF > hide_symbols.txt
          _nmod_mat_left_nullspace
          _nmod_mat_nullspace
          _fmpz_mat_nullspace
          _fmpz_mat_rank
          _fmpz_mat_solve
          EOF

          echo "Step 1: Extracting FLINT archive members..."
          rm -rf flint-obj-patch
          mkdir -p flint-obj-patch
          cd flint-obj-patch
          ar -x "$FLINT_A"

          echo "Step 2: Changing symbol visibility in extracted object files..."
          found_obj=0
          patched_obj=0
          for obj in *.o; do
            [ -e "$obj" ] || continue
            found_obj=1
            nm -m "$obj" \
              | grep ' external ' \
              | grep -v 'undefined' \
              | sed -n 's/^.* external \(_[^[:space:]]*\)$/\1/p' \
              | grep -Fxf ../hide_symbols.txt > .obj-hide-symbols.txt || true
            if [ -s .obj-hide-symbols.txt ]; then
              echo "  Patching $obj"
              sed 's/^/    - /' .obj-hide-symbols.txt
              nmedit -p -R .obj-hide-symbols.txt "$obj"
              patched_obj=1
            fi
          done
          if [ "$found_obj" -eq 0 ]; then
            echo "Error: failed to extract object files from FLINT archive."
            exit 1
          fi
          if [ "$patched_obj" -eq 0 ]; then
            echo "Warning: no extracted FLINT object file matched the conflict list before patching."
          fi

          echo "Step 3: Rebuilding libflint.a from patched object files..."
          rm -f "$FLINT_A"
          libtool -static -o "$FLINT_A" *.o
          cd ..

          echo "Step 4: Re-indexing the library..."
          ranlib "$FLINT_A"

          echo "Step 5: Verification..."
          # On Mach-O, `nmedit -p` turns symbols into "private external".
          # `nm -g` still lists private externs, so use `nm -m` and only fail
          # if a symbol remains plain external (non-private).
          for sym in \
            _nmod_mat_left_nullspace \
            _nmod_mat_nullspace \
            _fmpz_mat_nullspace \
            _fmpz_mat_rank \
            _fmpz_mat_solve; do
            sym_lines="$(nm -m "$FLINT_A" | grep -w "$sym" | grep -v 'undefined' || true)"
            if [ -z "$sym_lines" ]; then
              echo "Info: $sym not present in FLINT archive after nmedit; skipping."
              continue
            fi
            if echo "$sym_lines" | grep -v 'private external' > /dev/null; then
              echo "Error: $sym is still a non-private external symbol in FLINT."
              echo "$sym_lines"
              exit 1
            fi
          done
          echo "Success: Symbols are private externs in FLINT. Linker will prefer PML."
          
      - name: Configure project (static)
        run: |
          # Pass LDFLAGS as an environment variable BEFORE the command
          export LDFLAGS="-L$INSTALL_PREFIX/lib -Wl,-no_compact_unwind"
          ./configure \
            --enable-static \
            --flint-include="$INSTALL_PREFIX/include" \
            --flint-lib="$INSTALL_PREFIX/lib"

      - name: Build
        run: |
          export LDFLAGS="-L$INSTALL_PREFIX/lib -Wl,-no_compact_unwind"
          make static-all -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: make check

      - name: Verify static linkage
        run: |
          echo "=== otool -L drsolve ==="
          otool -L ./drsolve
          if otool -L ./drsolve | grep -E 'libflint|libpml'; then
            echo "ERROR: binary is dynamically linked against FLINT or PML"
            exit 1
          fi
          echo "OK: FLINT and PML are statically linked"

      - name: Prepare release artifact
        run: |
          MACOS_VER=$(sw_vers -productVersion | cut -d. -f1-2)
          ARCH=$(uname -m)
          TAG="${{ github.ref_name }}"
          strip ./drsolve
          ARTIFACT_NAME="drsolve-${TAG}-macos${MACOS_VER}-${ARCH}"
          mkdir -p dist
          cp ./drsolve "dist/${ARTIFACT_NAME}"
          cat > dist/build-info-macos.txt <<EOF
          Binary   : ${ARTIFACT_NAME}
          Built on : $(date -u +"%Y-%m-%d %H:%M UTC")
          macOS    : $(sw_vers -productVersion)
          Arch     : ${ARCH}
          Ref      : ${{ github.ref }}
          SHA      : ${{ github.sha }}
          FLINT    : static (3.4.0)
          PML      : static
          EOF
          cat dist/build-info-macos.txt
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
          retention-days: 90

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARTIFACT_NAME }}
          body_path: dist/build-info-macos.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
