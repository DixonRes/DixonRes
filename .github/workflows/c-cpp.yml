name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgmp-dev \
          libmpfr-dev \
          autoconf \
          automake \
          libtool \
          pkg-config \
          make \
          gcc \
          g++

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew update
        brew install flint gmp mpfr autoconf automake libtool pkg-config

    - name: Build and Install FLINT from source (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        git clone --depth=1 https://github.com/flintlib/flint.git
        cd flint
        ./bootstrap.sh
        ./configure
        make -j$(nproc)
        sudo make install
        sudo ldconfig

    - name: Clone and Install PML (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        git clone https://github.com/vneiger/pml.git
        cd pml/flint-extras
        ./bootstrap.sh
        ./configure
        make -j$(nproc)
        sudo make install

    - name: Clone and Install PML (macOS)
      if: runner.os == 'macOS'
      run: |
        git clone https://github.com/vneiger/pml.git
        cd pml/flint-extras
        
        export CPATH=/opt/homebrew/include:/usr/local/include:$CPATH
        export LIBRARY_PATH=/opt/homebrew/lib:/usr/local/lib:$LIBRARY_PATH
        export PKG_CONFIG_PATH=/opt/homebrew/lib/pkgconfig:/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
        
        ./bootstrap.sh
        ./configure
        make -j$(sysctl -n hw.ncpu)
        sudo make install

    - name: Build and Test (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        ./configure
        make -j$(nproc)
        make check

    - name: Build and Test (macOS)
      if: runner.os == 'macOS'
      run: |
        export CPATH=/opt/homebrew/include:/usr/local/include:$CPATH
        export LIBRARY_PATH=/opt/homebrew/lib:/usr/local/lib:$LIBRARY_PATH
        export PKG_CONFIG_PATH=/opt/homebrew/lib/pkgconfig:/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
        
        ./configure
        make -j$(sysctl -n hw.ncpu)
        make check
