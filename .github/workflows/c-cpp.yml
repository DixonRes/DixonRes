name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libflint-dev \
          libgmp-dev \
          libmpfr-dev \
          autoconf \
          automake \
          libtool \
          pkg-config \
          make \
          gcc \
          g++

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew update
        brew install flint gmp mpfr autoconf automake libtool pkg-config

    - name: Clone and Install PML
      run: |
        git clone https://github.com/vneiger/pml.git
        cd pml/flint-extras
        ./bootstrap.sh
        ./configure
        make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
        sudo make install

    - name: Build and Test (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        ./configure
        make -j$(nproc)
        make check

    - name: Build and Test (macOS)
      if: runner.os == 'macOS'
      run: |
        ./configure
        make -j$(sysctl -n hw.ncpu)
        make check
