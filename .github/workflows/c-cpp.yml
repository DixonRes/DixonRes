name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Environment
      uses: mamba-org/setup-micromamba@v1
      with:
        environment-name: build-env
        condarc: |
          channels:
            - conda-forge
        create-args: >-
          libflint
          gmp
          mpfr
          pkg-config
          make
          c-compiler
          cxx-compiler
        cache-environment: true
        cache-downloads: true

    - name: Build and Test
      shell: micromamba-shell {0}
      run: |
        ./configure
        make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
        make check
