name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Conda (Ubuntu)
      if: runner.os == 'Linux'
      uses: mamba-org/setup-micromamba@v1
      with:
        environment-name: build-env
        create-args: >-
          libflint
          gmp
          mpfr
          pkg-config
          make
          c-compiler
          cxx-compiler
          autoconf
          automake
          libtool
        cache-environment: true

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew update
        brew install flint autoconf automake libtool

    - name: Clone and Install PML
      run: |
        git clone https://github.com/vneiger/pml.git
        cd pml/flint-extras
        ./bootstrap.sh
        ./configure
        make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
        sudo make install

    - name: Build and Test (Ubuntu)
      if: runner.os == 'Linux'
      shell: micromamba-shell {0}
      run: |
        ./configure
        make -j$(nproc)
        make check

    - name: Build and Test (macOS)
      if: runner.os == 'macOS'
      run: |
        ./configure
        make -j$(sysctl -n hw.ncpu)
        make check
