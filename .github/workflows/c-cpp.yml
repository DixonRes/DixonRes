name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ──────────────────────────────────────────────────────────────
  # Linux: static build + test + artifact
  # ──────────────────────────────────────────────────────────────
  build-linux-static:
    runs-on: ubuntu-latest
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/deps-static

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgmp-dev libmpfr-dev \
            autoconf automake libtool pkg-config \
            make gcc g++ binutils

      - name: Set build environment
        run: |
          echo "INSTALL_PREFIX=$INSTALL_PREFIX"               >> $GITHUB_ENV
          echo "C_INCLUDE_PATH=$INSTALL_PREFIX/include"       >> $GITHUB_ENV
          echo "LIBRARY_PATH=$INSTALL_PREFIX/lib"             >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$INSTALL_PREFIX/lib/pkgconfig" >> $GITHUB_ENV
          mkdir -p "$INSTALL_PREFIX"

      - name: Build FLINT (static)
        run: |
          git clone --depth=1 https://github.com/flintlib/flint.git
          cd flint
          ./bootstrap.sh
          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --enable-static \
            --disable-shared
          make -j$(nproc)
          make install

      - name: Build PML (static)
        run: |
          git clone https://github.com/vneiger/pml.git
          cd pml/flint-extras
          ./bootstrap.sh
          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --enable-static \
            --disable-shared
          make -j$(nproc)
          make install

      # Linux GNU ld: --allow-multiple-definition handles FLINT/PML
      # duplicate symbols at link time; no archive pre-processing needed.

      - name: Configure project (static)
        run: |
          ./configure \
            --enable-static \
            --flint-include="$INSTALL_PREFIX/include" \
            --flint-lib="$INSTALL_PREFIX/lib" \
            --pml-include="$INSTALL_PREFIX/include" \
            --pml-lib="$INSTALL_PREFIX/lib"

      - name: Build
        run: make -j$(nproc)

      - name: Run tests
        run: make check

      - name: Verify static linkage
        run: |
          echo "=== ldd dixon ==="
          ldd ./dixon || true
          if ldd ./dixon 2>/dev/null | grep -E 'libflint|libpml'; then
            echo "ERROR: binary is dynamically linked against FLINT or PML"
            exit 1
          fi
          echo "OK: FLINT and PML are statically linked"

      - name: Prepare release artifact
        run: |
          ARCH=$(uname -m)
          TAG="${{ github.ref_name }}"
          strip ./dixon
          ARTIFACT_NAME="dixon-${TAG}-linux-${ARCH}"
          mkdir -p dist
          cp ./dixon "dist/${ARTIFACT_NAME}"
          cat > dist/build-info-linux.txt <<EOF
          Binary   : ${ARTIFACT_NAME}
          Built on : $(date -u +"%Y-%m-%d %H:%M UTC")
          OS       : $(lsb_release -ds 2>/dev/null || uname -sr)
          Arch     : ${ARCH}
          Ref      : ${{ github.ref }}
          SHA      : ${{ github.sha }}
          FLINT    : static
          PML      : static
          EOF
          cat dist/build-info-linux.txt
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
          retention-days: 90

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARTIFACT_NAME }}
          body_path: dist/build-info-linux.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ──────────────────────────────────────────────────────────────
  # macOS: static build + test + artifact
  # ──────────────────────────────────────────────────────────────
  build-macos-static:
    runs-on: macos-latest
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/deps-static

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          brew update
          brew install gmp mpfr autoconf automake libtool pkg-config

      - name: Set build environment
        run: |
          BREW=$(brew --prefix)
          echo "INSTALL_PREFIX=$INSTALL_PREFIX"                                      >> $GITHUB_ENV
          echo "CPATH=$INSTALL_PREFIX/include:$BREW/include"                         >> $GITHUB_ENV
          echo "LIBRARY_PATH=$INSTALL_PREFIX/lib:$BREW/lib"                          >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$INSTALL_PREFIX/lib/pkgconfig:$BREW/lib/pkgconfig"   >> $GITHUB_ENV
          mkdir -p "$INSTALL_PREFIX"

      - name: Build FLINT (static)
        run: |
          BREW=$(brew --prefix)
          git clone --depth=1 https://github.com/flintlib/flint.git
          cd flint
          ./bootstrap.sh
          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --enable-static \
            --disable-shared \
            --with-gmp="$BREW" \
            --with-mpfr="$BREW"
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build PML (static)
        run: |
          git clone https://github.com/vneiger/pml.git
          cd pml/flint-extras
          ./bootstrap.sh
          ./configure \
            --prefix="$INSTALL_PREFIX" \
            --enable-static \
            --disable-shared
          make -j$(sysctl -n hw.ncpu)
          make install

      # macOS Apple ld has no --allow-multiple-definition.
      # FLINT and PML intentionally share some symbol names (PML extends
      # FLINT).  Fix: find every libflint.a object whose exported symbols
      # collide with libpml.a, and remove those objects from libflint.a
      # so PML's definitions are the sole definitions at link time.
      - name: Deduplicate FLINT/PML static libraries (macOS)
        run: |
          FLINT_A="$INSTALL_PREFIX/lib/libflint.a"
          PML_A="$INSTALL_PREFIX/lib/libpml.a"

          TMPDIR_FLINT=$(mktemp -d)
          TMPDIR_PML=$(mktemp -d)

          echo "Extracting archives..."
          (cd "$TMPDIR_FLINT" && ar -x "$FLINT_A")
          (cd "$TMPDIR_PML"   && ar -x "$PML_A")

          echo "Collecting symbols exported by PML..."
          PML_SYMS=$(nm -g "$TMPDIR_PML"/*.o 2>/dev/null \
            | awk '/ T / || / D / || / B / {print $3}' \
            | sort -u)

          echo "Finding conflicting FLINT objects..."
          TO_DELETE=""
          for obj in "$TMPDIR_FLINT"/*.o; do
            obj_name=$(basename "$obj")
            while IFS= read -r sym; do
              [ -z "$sym" ] && continue
              if echo "$PML_SYMS" | grep -qxF "$sym"; then
                echo "  conflict: $sym  in  $obj_name"
                TO_DELETE="$TO_DELETE $obj_name"
                break
              fi
            done < <(nm -g "$obj" 2>/dev/null \
              | awk '/ T / || / D / || / B / {print $3}')
          done

          rm -rf "$TMPDIR_FLINT" "$TMPDIR_PML"

          if [ -n "$TO_DELETE" ]; then
            echo "Removing from libflint.a: $TO_DELETE"
            # shellcheck disable=SC2086
            ar -d "$FLINT_A" $TO_DELETE
            echo "Deduplication complete."
          else
            echo "No conflicting objects found."
          fi

      - name: Configure project (static)
        run: |
          ./configure \
            --enable-static \
            --flint-include="$INSTALL_PREFIX/include" \
            --flint-lib="$INSTALL_PREFIX/lib" \
            --pml-include="$INSTALL_PREFIX/include" \
            --pml-lib="$INSTALL_PREFIX/lib"

      - name: Build
        run: make -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: make check

      - name: Verify static linkage
        run: |
          echo "=== otool -L dixon ==="
          otool -L ./dixon
          if otool -L ./dixon | grep -E 'libflint|libpml'; then
            echo "ERROR: binary is dynamically linked against FLINT or PML"
            exit 1
          fi
          echo "OK: FLINT and PML are statically linked"

      - name: Prepare release artifact
        run: |
          MACOS_VER=$(sw_vers -productVersion | cut -d. -f1-2)
          ARCH=$(uname -m)
          TAG="${{ github.ref_name }}"
          strip ./dixon
          ARTIFACT_NAME="dixon-${TAG}-macos${MACOS_VER}-${ARCH}"
          mkdir -p dist
          cp ./dixon "dist/${ARTIFACT_NAME}"
          cat > dist/build-info-macos.txt <<EOF
          Binary   : ${ARTIFACT_NAME}
          Built on : $(date -u +"%Y-%m-%d %H:%M UTC")
          macOS    : $(sw_vers -productVersion)
          Arch     : ${ARCH}
          Ref      : ${{ github.ref }}
          SHA      : ${{ github.sha }}
          FLINT    : static
          PML      : static
          EOF
          cat dist/build-info-macos.txt
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/
          retention-days: 90

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARTIFACT_NAME }}
          body_path: dist/build-info-macos.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
